quarkus.http.port=8888
# ======================================================
# Datasource configuration
# ======================================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=sqluser
quarkus.datasource.password=sqluserpw
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/login_
quarkus.datasource.jdbc.driver=com.mysql.cj.jdbc.Driver

# ======================================================
# Hibernate ORM configuration
# ======================================================
quarkus.hibernate-orm.dialect=org.hibernate.dialect.MySQLDialect
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.format-sql=true
quarkus.hibernate-orm.statistics=true

# To auto-create/update schema (optional)
# quarkus.hibernate-orm.database.generation=create

# ======================================================
# C3P0-like connection pool settings (Quarkus uses Agroal)
# ======================================================
# These are Agroal equivalents of your C3P0 settings
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.initial-size=5
quarkus.datasource.idle-removal-interval=300s  # test every 5 min
quarkus.datasource.jdbc.acquisition-timeout=30s

# ======================================================
# Entities (Quarkus auto-discovers, but can be explicit)
# ======================================================
# You don?t need to list entity classes manually ? Quarkus scans automatically.
# If you want to restrict scanning to a specific package:
# quarkus.hibernate-orm.packages=com.jeet.api,com.jeet.broadcasting.eventModel

# --- Your JAX-RS root path ---
quarkus.http.root-path=/mbook-1
quarkus.kafka.devservices.enabled=false
#quarkus.hibernate-search-orm.elasticsearch.version=8

# --- OpenTelemetry ---
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.traces.exporter=otlp
quarkus.otel.service.name=mbook-quarkus
quarkus.otel.traces.sampler=parentbased_always_on
quarkus.log.console.json.pretty-print=true
